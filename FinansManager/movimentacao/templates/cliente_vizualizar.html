{% extends "navbar.html" %}
 {% block titlle %}
      <ion-icon name="add-outline"></ion-icon>
      CRIAR CLIENTES
      {% endblock %}

{% block body %}
<script type="text/javascript">
    function maskCPF(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length <= 11) {
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        }
        input.value = value;
    }

    function maskTelefone(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length <= 11) {
            if (value.length <= 10) {
                value = value.replace(/(\d{2})(\d)/, '($1) $2');
                value = value.replace(/(\d{4})(\d{4})$/, '$1-$2');
            } else {
                value = value.replace(/(\d{2})(\d)/, '($1) $2');
                value = value.replace(/(\d{5})(\d{4})$/, '$1-$2');
            }
        }
        input.value = value;
    }

    document.addEventListener('DOMContentLoaded', function() {
        const cpfInput = document.getElementById('cpf');
        const telefoneInput = document.getElementById('telefone');

        if (cpfInput) {
            cpfInput.addEventListener('input', function() { maskCPF(this); });
        }
        if (telefoneInput) {
            telefoneInput.addEventListener('input', function() { maskTelefone(this); });
        }
    });
</script>
   

        <form method="POST" class="popup">
            <label for="nome" class="form-label">Nome do Cliente:</label>
            <input type="text" class="form-control" id="nome" name="nome" value="{{cliente.nome}}" readonly>
            <label for="cpf" class="form-label">CPF do Cliente:</label>
            <input type="text" class="form-control" id="cpf" name="cpf" value="{{cliente.cpf}}" readonly>
            <label for="telefone" class="form-label">Telefone do Cliente:</label>
            <input type="text" class="form-control" id="telefone" name="telefone" value="{{cliente.telefone}}" readonly>
            <label for="endereco" class="form-label">Endereço do Cliente:</label>
            <input type="text" class="form-control" id="endereco" name="endereco" value="{{cliente.endereco}}" readonly>
            <label for="email" class="form-label">Email do Cliente:</label>
            <input type="email" class="form-control" id="email" name="email" value="{{cliente.email}}" readonly>
            <label for="data_nascimento" class="form-label">Data de Nascimento:</label>
            <input type="date" class="form-control" id="data_nascimento" name="data_nascimento" value="{{cliente.data_nascimento}}" readonly>
            <label for="nome_vendedor" class="form-label">Nome do Vendedor:</label>
            
            {% for c, v in vendedores %}
                {% if c.id == cliente.id %}
                    <input type="text" class="form-control" id="nome_vendedor" name="nome_vendedor" value="{{v.username}}" readonly>
                {% endif %}
            {% endfor %}

        </form>
      </div>
    </div>
  </body>

{% endblock %}
