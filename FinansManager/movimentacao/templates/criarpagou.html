{% extends "navbar.html" %}
 {% block titlle %}
      <ion-icon name="add-outline"></ion-icon>
      RECEBIMENTO
      {% endblock %}

{% block body %}

    
        <form method="POST" class="popup">
            <label for="nome" class="form-label">Nome do Cliente:</label>
            <input type="text" class="form-control" id="nome" name="nome" value="{{clientes.nome}}">
            <label for="valor" class="form-label">Valor Recebido:</label>
            <input type="text" class="form-control" id="valor" name="valor"  >
            <label for="obs" class="form-label">Observação:</label>
            <input type="text" class="form-control" id="obs" name="obs">
            <div class="form-check">
            <input class="form-check-input" type="radio" name="atrasado" value="sim" id="atrasado1">
            <label class="form-check-label" for="atrasado1">
              ATRASADO
            </label>
            </div>
            <div class="form-check">
            <input class="form-check-input" type="radio" name="atrasado" value="nao" id="atrasado2" checked>
            <label class="form-check-label" for="atrasado2">
              NAO ATRASADO
            </label>
            </div>
            <button type="submit" class="btn btn-success">RECEBIMENTO</button>
        </form>
      </div>
    </div>
  </body>

{% endblock %}
